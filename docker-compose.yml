version: "3.9"

services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: mcc
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    ports:
      - "6379:6379"

  backend:
    build:
      context: ./apps/backend
      dockerfile: Dockerfile
    env_file:
      - .env
    ports:
      - "8000:8000"
    depends_on:
      - postgres
      - redis

  # Celery workers for background removal + preview rendering.
  # All three share the same backend image (no separate Dockerfile); they
  # just run `celery` instead of `uvicorn` as the entry command.
  worker-bgremoval:
    build:
      context: ./apps/backend
      dockerfile: Dockerfile
    env_file:
      - .env
    command: >
      celery -A app.workers.celery_app worker
      -Q bgremoval_interactive,bgremoval_prime,bgremoval,bgremoval_bulk,sync_hooks
      -c 2
      -n bgremoval@%h
    depends_on:
      - postgres
      - redis

  worker-render:
    build:
      context: ./apps/backend
      dockerfile: Dockerfile
    env_file:
      - .env
    command: >
      celery -A app.workers.celery_app worker
      -Q render_hi,render_bulk
      -c 4
      -n render@%h
    depends_on:
      - postgres
      - redis

  worker-beat:
    build:
      context: ./apps/backend
      dockerfile: Dockerfile
    env_file:
      - .env
    command: >
      celery -A app.workers.celery_app beat
      --loglevel=info
    depends_on:
      - postgres
      - redis

  frontend:
    build:
      context: ./apps/frontend
      dockerfile: Dockerfile
    environment:
      BACKEND_API_URL: http://backend:8000
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  pg_data:
